<!DOCTYPE html>
<html>
<head>
    <title>AdsGram Test</title>
    <script src="https://partner.adsgram.ai/adsgram.min.js"></script>
    <style>
        body { font-family: Arial; max-width: 400px; margin: 50px auto; padding: 20px; background: #0f0c29; color: white; }
        .box { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 15px; text-align: center; }
        button { background: #ffd700; color: #000; border: none; padding: 15px 30px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; margin: 10px 0; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .status { padding: 15px; border-radius: 10px; margin: 10px 0; }
        .ready { background: rgba(0,255,136,0.2); color: #00ff88; border: 1px solid #00ff88; }
        .loading { background: rgba(255,215,0,0.2); color: #ffd700; border: 1px solid #ffd700; }
        .error { background: rgba(255,68,68,0.2); color: #ff4444; border: 1px solid #ff4444; }
        .log { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px; margin-top: 20px; max-height: 300px; overflow-y: auto; font-size: 12px; text-align: left; font-family: monospace; }
        .success { color: #00ff88; }
        .error-text { color: #ff4444; }
        .info { color: #ffd700; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white; font-size: 16px; margin: 10px 0; }
        .block-id-input { display: flex; gap: 10px; align-items: center; }
        .block-id-input input { flex: 1; }
        .block-id-input button { width: auto; padding: 12px 20px; margin: 0; }
    </style>
</head>
<body>
    <div class="box">
        <h1>🎬 AdsGram Test</h1>
        
        <div class="block-id-input">
            <input type="text" id="blockIdInput" value="36912" placeholder="Enter Block ID">
            <button onclick="setBlockId()" style="width: auto; padding: 12px 20px; background: #667eea;">Set</button>
        </div>
        
        <div id="status" class="status loading">⏳ Loading AdsGram SDK...</div>
        
        <div style="font-size: 32px; margin: 20px 0;">
            🪙 <span id="balance">0.00</span>
        </div>
        
        <button id="watchBtn" onclick="watchAd()" disabled>
            ▶️ Watch Ad - +10 Coins
        </button>
        
        <button onclick="testAdsGram()" style="background: linear-gradient(135deg, #667eea, #764ba2);">
            🔧 Test AdsGram
        </button>
        
        <button onclick="forceReload()" style="background: linear-gradient(135deg, #ff4444, #cc0000);">
            🔄 Force Reload
        </button>
        
        <div class="log" id="log">
            <div class="info">📋 Log started...</div>
        </div>
    </div>

    <script>
        // =============================================
        // CONFIG
        // =============================================
        let BLOCK_ID = '36912';
        let adsgram = null;
        let isReady = false;
        let balance = 0;
        let isWatching = false;
        let initAttempts = 0;
        
        // =============================================
        // LOG FUNCTION
        // =============================================
        function addLog(message, type = 'info') {
            const log = document.getElementById('log');
            const div = document.createElement('div');
            div.className = type;
            div.textContent = '[' + new Date().toLocaleTimeString() + '] ' + message;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
            console.log(message);
        }
        
        function setBlockId() {
            const input = document.getElementById('blockIdInput');
            BLOCK_ID = input.value.trim() || '36912';
            addLog('📡 Block ID set to: ' + BLOCK_ID, 'info');
            // Reinitialize
            isReady = false;
            initAttempts = 0;
            document.getElementById('watchBtn').disabled = true;
            document.getElementById('status').className = 'status loading';
            document.getElementById('status').textContent = '⏳ Reinitializing...';
            setTimeout(initAdsGram, 500);
        }
        
        // =============================================
        // INIT ADSGRAM - Detailed Version
        // =============================================
        function initAdsGram() {
            const statusEl = document.getElementById('status');
            initAttempts++;
            
            addLog('🔄 Initializing AdsGram... (Attempt ' + initAttempts + ')', 'info');
            addLog('📡 Block ID: ' + BLOCK_ID, 'info');
            
            try {
                // Step 1: Check if SDK is loaded
                if (typeof window.AdsGram === 'undefined') {
                    addLog('❌ AdsGram SDK not found!', 'error-text');
                    addLog('💡 Check: Script tag is loading properly', 'error-text');
                    
                    if (initAttempts < 3) {
                        statusEl.textContent = '⏳ Loading SDK... (' + initAttempts + '/3)';
                        statusEl.className = 'status loading';
                        setTimeout(initAdsGram, 2000);
                        return;
                    } else {
                        statusEl.textContent = '❌ SDK Not Loaded';
                        statusEl.className = 'status error';
                        addLog('❌ SDK failed to load after 3 attempts', 'error-text');
                        addLog('💡 Try: Reload page or check internet', 'error-text');
                        return;
                    }
                }
                addLog('✅ AdsGram SDK found!', 'success');
                
                // Step 2: Create AdsGram instance
                statusEl.textContent = '⏳ Creating AdsGram instance...';
                statusEl.className = 'status loading';
                addLog('🔄 Creating AdsGram instance...', 'info');
                
                adsgram = new window.AdsGram({
                    blockId: BLOCK_ID,
                    onReady: function() {
                        addLog('✅ AdsGram Ready! Block: ' + BLOCK_ID, 'success');
                        isReady = true;
                        statusEl.textContent = '✅ AdsGram Ready! Block: ' + BLOCK_ID;
                        statusEl.className = 'status ready';
                        document.getElementById('watchBtn').disabled = false;
                        addLog('✅ Watch button enabled!', 'success');
                    },
                    onError: function(error) {
                        addLog('⚠️ AdsGram Error: ' + JSON.stringify(error), 'error-text');
                        // Still enable buttons
                        isReady = true;
                        statusEl.textContent = '⚠️ Ads Ready (Limited)';
                        statusEl.className = 'status error';
                        document.getElementById('watchBtn').disabled = false;
                        addLog('⚠️ Watch button enabled (limited mode)', 'info');
                    }
                });
                
                // Step 3: Check if showAd exists
                setTimeout(function() {
                    if (adsgram) {
                        addLog('📊 AdsGram instance created', 'info');
                        if (typeof adsgram.showAd === 'function') {
                            addLog('✅ showAd() method available!', 'success');
                        } else {
                            addLog('❌ showAd() method NOT available!', 'error-text');
                            addLog('📊 Type of showAd: ' + typeof adsgram.showAd, 'error-text');
                        }
                    } else {
                        addLog('❌ AdsGram instance is null', 'error-text');
                    }
                }, 1000);
                
                // Step 4: Fallback timeout
                setTimeout(function() {
                    if (!isReady) {
                        addLog('⏳ Timeout - enabling anyway', 'info');
                        isReady = true;
                        statusEl.textContent = '⚠️ Ads Ready (Timeout)';
                        statusEl.className = 'status error';
                        document.getElementById('watchBtn').disabled = false;
                        addLog('⚠️ Watch button enabled (timeout)', 'info');
                    }
                }, 8000);
                
            } catch (error) {
                addLog('❌ Init Error: ' + error.message, 'error-text');
                addLog('📊 Error stack: ' + error.stack, 'error-text');
                statusEl.textContent = '❌ Init Failed';
                statusEl.className = 'status error';
            }
        }
        
        // =============================================
        // WATCH AD - With Detailed Logging
        // =============================================
        function watchAd() {
            addLog('▶️ Watch Ad clicked!', 'info');
            addLog('📊 isReady: ' + isReady, 'info');
            addLog('📊 adsgram: ' + (adsgram ? 'exists' : 'null'), 'info');
            
            if (isWatching) {
                addLog('⏳ Already watching...', 'info');
                return;
            }
            
            if (!isReady) {
                addLog('⚠️ Not ready yet!', 'error-text');
                addLog('💡 Please wait or click "Test AdsGram"', 'error-text');
                return;
            }
            
            if (!adsgram) {
                addLog('❌ adsgram is null!', 'error-text');
                addLog('🔄 Reinitializing...', 'info');
                initAdsGram();
                return;
            }
            
            if (typeof adsgram.showAd !== 'function') {
                addLog('❌ showAd() is not a function!', 'error-text');
                addLog('📊 Type: ' + typeof adsgram.showAd, 'error-text');
                return;
            }
            
            isWatching = true;
            document.getElementById('watchBtn').disabled = true;
            document.getElementById('watchBtn').textContent = '⏳ Watching...';
            addLog('▶️ Starting ad...', 'info');
            
            try {
                addLog('📺 Calling adsgram.showAd()...', 'info');
                
                adsgram.showAd()
                    .then(function(result) {
                        addLog('✅ Ad completed!', 'success');
                        addLog('📊 Result: ' + JSON.stringify(result), 'success');
                        balance += 0.010;
                        document.getElementById('balance').textContent = balance.toFixed(2);
                        addLog('🪙 +10 Coins! Total: ' + balance.toFixed(2), 'success');
                        isWatching = false;
                        document.getElementById('watchBtn').disabled = false;
                        document.getElementById('watchBtn').textContent = '▶️ Watch Ad - +10 Coins';
                    })
                    .catch(function(error) {
                        addLog('❌ Ad error: ' + JSON.stringify(error), 'error-text');
                        addLog('📊 Error details: ' + (error.message || 'Unknown'), 'error-text');
                        // Still give coins (demo mode)
                        balance += 0.010;
                        document.getElementById('balance').textContent = balance.toFixed(2);
                        addLog('🪙 +10 Coins (demo mode)!', 'info');
                        isWatching = false;
                        document.getElementById('watchBtn').disabled = false;
                        document.getElementById('watchBtn').textContent = '▶️ Watch Ad - +10 Coins';
                    });
            } catch (error) {
                addLog('❌ Exception: ' + error.message, 'error-text');
                addLog('📊 Stack: ' + error.stack, 'error-text');
                isWatching = false;
                document.getElementById('watchBtn').disabled = false;
                document.getElementById('watchBtn').textContent = '▶️ Watch Ad - +10 Coins';
            }
        }
        
        // =============================================
        // TEST ADSGRAM - Detailed Check
        // =============================================
        function testAdsGram() {
            addLog('🔧 ===== STARTING TEST =====', 'info');
            
            // Check 1: SDK
            if (typeof window.AdsGram === 'undefined') {
                addLog('❌ FAIL: AdsGram SDK is undefined', 'error-text');
                addLog('💡 Solution: Check script tag', 'error-text');
            } else {
                addLog('✅ PASS: AdsGram SDK exists', 'success');
            }
            
            // Check 2: Block ID
            addLog('📡 Block ID: ' + BLOCK_ID, 'info');
            
            // Check 3: adsgram instance
            if (!adsgram) {
                addLog('❌ FAIL: adsgram instance is null', 'error-text');
                addLog('🔄 Trying to initialize...', 'info');
                initAdsGram();
            } else {
                addLog('✅ PASS: adsgram instance exists', 'success');
            }
            
            // Check 4: showAd method
            if (adsgram && typeof adsgram.showAd === 'function') {
                addLog('✅ PASS: showAd() is a function', 'success');
                
                // Try to call showAd directly
                addLog('🔄 Testing showAd() directly...', 'info');
                try {
                    adsgram.showAd()
                        .then(function() {
                            addLog('✅ Test ad completed successfully!', 'success');
                        })
                        .catch(function(e) {
                            addLog('❌ Test ad failed: ' + JSON.stringify(e), 'error-text');
                        });
                } catch(e) {
                    addLog('❌ Test exception: ' + e.message, 'error-text');
                }
            } else {
                addLog('❌ FAIL: showAd() is NOT a function', 'error-text');
                if (adsgram) {
                    addLog('📊 showAd type: ' + typeof adsgram.showAd, 'error-text');
                }
            }
            
            // Check 5: isReady
            addLog('📊 isReady: ' + isReady, 'info');
            
            // Check 6: Watch button
            const btn = document.getElementById('watchBtn');
            addLog('📊 Watch button disabled: ' + btn.disabled, 'info');
            
            addLog('🔧 ===== TEST COMPLETE =====', 'info');
        }
        
        // =============================================
        // FORCE RELOAD
        // =============================================
        function forceReload() {
            addLog('🔄 ===== FORCE RELOAD =====', 'info');
            isReady = false;
            initAttempts = 0;
            document.getElementById('watchBtn').disabled = true;
            document.getElementById('status').className = 'status loading';
            document.getElementById('status').textContent = '⏳ Reloading...';
            
            // Remove existing script
            const scripts = document.querySelectorAll('script[src="https://partner.adsgram.ai/adsgram.min.js"]');
            scripts.forEach(function(s) {
                s.remove();
                addLog('🗑️ Removed old script', 'info');
            });
            
            // Load new script
            addLog('📥 Loading fresh SDK...', 'info');
            const script = document.createElement('script');
            script.src = 'https://partner.adsgram.ai/adsgram.min.js';
            script.onload = function() {
                addLog('✅ SDK reloaded!', 'success');
                setTimeout(initAdsGram, 500);
            };
            script.onerror = function() {
                addLog('❌ Failed to load SDK!', 'error-text');
                document.getElementById('status').textContent = '❌ SDK Load Failed';
                document.getElementById('status').className = 'status error';
            };
            document.head.appendChild(script);
        }
        
        // =============================================
        // START
        // =============================================
        window.addEventListener('load', function() {
            addLog('🚀 Page loaded', 'info');
            addLog('📡 Default Block ID: ' + BLOCK_ID, 'info');
            addLog('💡 You can change Block ID in the input above', 'info');
            setTimeout(initAdsGram, 1000);
        });
    </script>
</body>
</html>
