<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0f1a" />
    <title>CoinPulse</title>

    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- AdsGram SDK -->
    <script src="https://a.adsgram.io/js/sdk.js"></script>

    <style>
        /* ============================================
           CoinPulse - Dark Modern Theme
           Mobile-first responsive design
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        :root {
            --bg-primary: #0b0f1a;
            --bg-secondary: #141a2b;
            --bg-card: #1a2138;
            --accent: #ffc83d;
            --accent-glow: rgba(255, 200, 61, 0.4);
            --text-primary: #ffffff;
            --text-secondary: #9aa3b8;
            --energy-color: #4ade80;
            --danger: #ef4444;
            --border: rgba(255, 255, 255, 0.08);
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: radial-gradient(ellipse at top, #1a2138 0%, #0b0f1a 70%);
            color: var(--text-primary);
        }

        body {
            display: flex;
            flex-direction: column;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        /* ============ TOP HUD ============ */
        .top-hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(20, 26, 43, 0.6);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }

        .hud-left { display: flex; align-items: center; gap: 10px; }

        .avatar {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #ff8a3d);
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 18px; color: #1a2138;
        }

        .user-info { display: flex; flex-direction: column; }
        .username { font-size: 14px; font-weight: 600; }

        .level-badge {
            font-size: 11px; color: var(--accent);
            background: rgba(255, 200, 61, 0.1);
            padding: 2px 8px; border-radius: 10px;
            margin-top: 2px; width: fit-content;
        }

        .coin-display {
            display: flex; align-items: center; gap: 6px;
            background: var(--bg-card);
            padding: 8px 14px; border-radius: 20px;
            font-weight: 700; font-size: 16px;
            border: 1px solid var(--border);
        }

        .coin-icon { font-size: 18px; }

        /* ============ ENERGY BAR ============ */
        .energy-wrap { padding: 10px 16px 6px; }

        .energy-label {
            display: flex; justify-content: space-between;
            font-size: 12px; color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .energy-bar {
            height: 8px; background: var(--bg-card);
            border-radius: 4px; overflow: hidden;
            border: 1px solid var(--border);
        }

        .energy-fill {
            height: 100%; width: 100%;
            background: linear-gradient(90deg, #4ade80, #22d3ee);
            border-radius: 4px;
            transition: width 0.3s ease;
            box-shadow: 0 0 8px rgba(74, 222, 128, 0.5);
        }

        /* ============ MAIN CONTENT ============ */
        .main-content {
            flex: 1; overflow-y: auto;
            padding: 10px 16px 20px;
            position: relative;
        }

        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .page-title { font-size: 22px; margin-bottom: 16px; font-weight: 700; }

        /* ============ TAP PAGE ============ */
        .tap-area {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: calc(100vh - 240px);
            gap: 20px;
        }

        .coin-wrapper {
            position: relative;
            width: 240px; height: 240px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }

        .coin {
            width: 200px; height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ffe066, #ffc83d 50%, #b8860b);
            display: flex; align-items: center; justify-content: center;
            box-shadow:
                0 0 40px var(--accent-glow),
                inset 0 -8px 20px rgba(0, 0, 0, 0.3),
                inset 0 8px 20px rgba(255, 255, 255, 0.3);
            transition: transform 0.1s ease;
            position: relative;
        }

        .coin-face {
            font-size: 100px;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
        }

        .coin-ring {
            position: absolute; inset: -10px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            opacity: 0; pointer-events: none;
        }

        .coin.pulse { transform: scale(0.92); }
        .coin-ring.pulse { animation: ringPulse 0.6s ease-out; }

        @keyframes ringPulse {
            0% { transform: scale(0.9); opacity: 1; }
            100% { transform: scale(1.4); opacity: 0; }
        }

        .tap-hint { color: var(--text-secondary); font-size: 14px; margin-top: 10px; }

        .float-text {
            position: absolute;
            color: var(--accent);
            font-weight: 700; font-size: 28px;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            text-shadow: 0 2px 8px rgba(255, 200, 61, 0.6);
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-80px) scale(1.4); }
        }

        .watch-ad-btn {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white; border: none;
            padding: 14px 24px; border-radius: 14px;
            font-size: 15px; font-weight: 600;
            cursor: pointer;
            display: flex; align-items: center; gap: 8px;
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
            transition: transform 0.15s ease;
        }

        .watch-ad-btn:active { transform: scale(0.95); }
        .watch-ad-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .ad-icon { font-size: 18px; }

        /* ============ MISSIONS ============ */
        .mission-list { display: flex; flex-direction: column; gap: 10px; }

        .mission-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px; padding: 14px;
            display: flex; align-items: center; gap: 12px;
        }

        .mission-icon {
            font-size: 32px; width: 48px; height: 48px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255, 200, 61, 0.1);
            border-radius: 12px;
        }

        .mission-info { flex: 1; }
        .mission-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
        .mission-progress { font-size: 12px; color: var(--text-secondary); }

        .mission-reward {
            background: rgba(255, 200, 61, 0.15);
            color: var(--accent);
            padding: 6px 10px; border-radius: 10px;
            font-size: 12px; font-weight: 700;
            border: none; cursor: pointer;
        }

        .mission-reward.claimable {
            background: linear-gradient(135deg, var(--accent), #ff8a3d);
            color: #1a2138;
            animation: glow 1.5s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 8px var(--accent-glow); }
            50% { box-shadow: 0 0 16px var(--accent-glow); }
        }

        .mission-item.completed { opacity: 0.5; }

        /* ============ DAILY REWARD ============ */
        .daily-card {
            background: linear-gradient(135deg, var(--bg-card), var(--bg-secondary));
            border: 1px solid var(--border);
            border-radius: 20px; padding: 24px;
            text-align: center;
        }

        .daily-streak {
            display: flex; align-items: center; justify-content: center;
            gap: 14px; margin-bottom: 20px;
        }

        .streak-icon { font-size: 48px; }
        .streak-num { font-size: 36px; font-weight: 800; color: var(--accent); }
        .streak-label { font-size: 12px; color: var(--text-secondary); }

        .daily-reward-preview {
            background: rgba(255, 200, 61, 0.1);
            padding: 12px; border-radius: 12px;
            margin-bottom: 16px; font-size: 14px;
        }

        .claim-btn {
            background: linear-gradient(135deg, var(--accent), #ff8a3d);
            color: #1a2138; border: none;
            padding: 14px 28px; border-radius: 14px;
            font-size: 16px; font-weight: 700;
            cursor: pointer; width: 100%;
            box-shadow: 0 6px 20px var(--accent-glow);
            transition: transform 0.15s ease;
        }

        .claim-btn:active { transform: scale(0.97); }

        .claim-btn:disabled {
            background: var(--bg-secondary);
            color: var(--text-secondary);
            box-shadow: none; cursor: not-allowed;
        }

        .daily-timer { margin-top: 14px; font-size: 13px; color: var(--text-secondary); }

        /* ============ LEADERBOARD ============ */
        .leaderboard-list { display: flex; flex-direction: column; gap: 8px; }

        .leaderboard-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px; padding: 12px 14px;
            display: flex; align-items: center; gap: 12px;
        }

        .leaderboard-item.top-1 {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.15), var(--bg-card));
            border-color: rgba(255, 215, 0, 0.3);
        }
        .leaderboard-item.top-2 {
            background: linear-gradient(135deg, rgba(192, 192, 192, 0.12), var(--bg-card));
            border-color: rgba(192, 192, 192, 0.25);
        }
        .leaderboard-item.top-3 {
            background: linear-gradient(135deg, rgba(205, 127, 50, 0.12), var(--bg-card));
            border-color: rgba(205, 127, 50, 0.25);
        }
        .leaderboard-item.me {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px var(--accent);
        }

        .lb-rank {
            font-size: 18px; font-weight: 800;
            width: 32px; text-align: center;
            color: var(--text-secondary);
        }

        .top-1 .lb-rank { color: #ffd700; }
        .top-2 .lb-rank { color: #c0c0c0; }
        .top-3 .lb-rank { color: #cd7f32; }

        .lb-avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 14px;
        }

        .lb-info { flex: 1; }
        .lb-name { font-size: 14px; font-weight: 600; }
        .lb-level { font-size: 11px; color: var(--text-secondary); }
        .lb-coins { font-weight: 700; color: var(--accent); font-size: 14px; }

        /* ============ PROFILE ============ */
        .profile-card {
            background: linear-gradient(135deg, var(--bg-card), var(--bg-secondary));
            border: 1px solid var(--border);
            border-radius: 20px; padding: 24px;
            text-align: center;
        }

        .profile-avatar {
            width: 80px; height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #ff8a3d);
            margin: 0 auto 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 36px; font-weight: 800; color: #1a2138;
        }

        .profile-name { font-size: 20px; font-weight: 700; margin-bottom: 20px; }

        .profile-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px; margin-bottom: 20px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px; padding: 12px 6px;
            border: 1px solid var(--border);
        }

        .stat-value { font-size: 18px; font-weight: 800; color: var(--accent); }
        .stat-label {
            font-size: 10px; color: var(--text-secondary);
            margin-top: 4px; text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .reset-btn {
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 10px 20px; border-radius: 10px;
            font-size: 13px; cursor: pointer; width: 100%;
        }

        /* ============ BOTTOM NAV ============ */
        .bottom-nav {
            display: flex; justify-content: space-around;
            background: rgba(20, 26, 43, 0.9);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--border);
            padding: 8px 4px calc(8px + env(safe-area-inset-bottom));
        }

        .nav-btn {
            flex: 1; background: none; border: none;
            color: var(--text-secondary);
            padding: 8px 4px; cursor: pointer;
            display: flex; flex-direction: column;
            align-items: center; gap: 2px;
            transition: color 0.2s ease;
        }

        .nav-btn.active { color: var(--accent); }
        .nav-icon { font-size: 20px; }
        .nav-label { font-size: 10px; font-weight: 600; }

        /* ============ TOAST ============ */
        .toast-container {
            position: fixed; top: 80px; left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex; flex-direction: column; gap: 8px;
            pointer-events: none;
        }

        .toast {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 10px 18px; border-radius: 12px;
            font-size: 13px;
            box-shadow: var(--shadow);
            animation: toastIn 0.3s ease, toastOut 0.3s ease 2.2s forwards;
            white-space: nowrap;
        }

        .toast.success { border-color: var(--energy-color); color: var(--energy-color); }
        .toast.error { border-color: var(--danger); color: var(--danger); }
        .toast.info { border-color: var(--accent); color: var(--accent); }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes toastOut {
            to { opacity: 0; transform: translateY(-10px); }
        }

        /* ============ RESPONSIVE ============ */
        @media (min-width: 500px) {
            .coin { width: 240px; height: 240px; }
            .coin-face { font-size: 120px; }
            .coin-wrapper { width: 280px; height: 280px; }
        }
    </style>
</head>
<body>
    <!-- ============ TOP HUD ============ -->
    <header class="top-hud">
        <div class="hud-left">
            <div class="avatar" id="avatar">?</div>
            <div class="user-info">
                <div class="username" id="username">Player</div>
                <div class="level-badge">Lvl <span id="level">1</span></div>
            </div>
        </div>
        <div class="hud-right">
            <div class="coin-display">
                <span class="coin-icon">🪙</span>
                <span id="coinCount">0</span>
            </div>
        </div>
    </header>

    <!-- ============ ENERGY BAR ============ -->
    <div class="energy-wrap">
        <div class="energy-label">
            <span>⚡ Energy</span>
            <span><span id="energyCurrent">100</span> / <span id="energyMax">100</span></span>
        </div>
        <div class="energy-bar">
            <div class="energy-fill" id="energyFill"></div>
        </div>
    </div>

    <!-- ============ MAIN CONTENT ============ -->
    <main class="main-content">
        <!-- TAP PAGE -->
        <section class="page active" id="page-tap">
            <div class="tap-area">
                <div class="coin-wrapper" id="coinWrapper">
                    <div class="coin" id="mainCoin">
                        <div class="coin-face">🪙</div>
                        <div class="coin-ring"></div>
                    </div>
                </div>
                <div class="tap-hint">Tap the coin!</div>
                <button class="watch-ad-btn" id="watchAdBtn">
                    <span class="ad-icon">🎬</span>
                    Watch Ad (+500 coins)
                </button>
            </div>
        </section>

        <!-- MISSIONS PAGE -->
        <section class="page" id="page-missions">
            <h2 class="page-title">🎯 Missions</h2>
            <div class="mission-list" id="missionList"></div>
        </section>

        <!-- DAILY REWARD PAGE -->
        <section class="page" id="page-daily">
            <h2 class="page-title">🎁 Daily Rewards</h2>
            <div class="daily-card">
                <div class="daily-streak">
                    <div class="streak-icon">🔥</div>
                    <div class="streak-text">
                        <div class="streak-num" id="streakCount">0</div>
                        <div class="streak-label">Day Streak</div>
                    </div>
                </div>
                <div class="daily-reward-preview">
                    Next reward: <strong id="nextReward">100</strong> 🪙
                </div>
                <button class="claim-btn" id="claimDailyBtn">Claim Daily Reward</button>
                <div class="daily-timer" id="dailyTimer"></div>
            </div>
        </section>

        <!-- LEADERBOARD PAGE -->
        <section class="page" id="page-leaderboard">
            <h2 class="page-title">🏆 Leaderboard</h2>
            <div class="leaderboard-list" id="leaderboardList"></div>
        </section>

        <!-- PROFILE PAGE -->
        <section class="page" id="page-profile">
            <h2 class="page-title">👤 Profile</h2>
            <div class="profile-card">
                <div class="profile-avatar" id="profileAvatar">?</div>
                <div class="profile-name" id="profileName">Player</div>
                <div class="profile-stats">
                    <div class="stat">
                        <div class="stat-value" id="profileCoins">0</div>
                        <div class="stat-label">Total Coins</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="profileLevel">1</div>
                        <div class="stat-label">Level</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="profileTaps">0</div>
                        <div class="stat-label">Total Taps</div>
                    </div>
                </div>
                <button class="reset-btn" id="resetBtn">Reset Progress</button>
            </div>
        </section>
    </main>

    <!-- ============ BOTTOM NAV ============ -->
    <nav class="bottom-nav">
        <button class="nav-btn active" data-page="tap">
            <span class="nav-icon">👆</span>
            <span class="nav-label">Tap</span>
        </button>
        <button class="nav-btn" data-page="missions">
            <span class="nav-icon">🎯</span>
            <span class="nav-label">Missions</span>
        </button>
        <button class="nav-btn" data-page="daily">
            <span class="nav-icon">🎁</span>
            <span class="nav-label">Daily</span>
        </button>
        <button class="nav-btn" data-page="leaderboard">
            <span class="nav-icon">🏆</span>
            <span class="nav-label">Top</span>
        </button>
        <button class="nav-btn" data-page="profile">
            <span class="nav-icon">👤</span>
            <span class="nav-label">Profile</span>
        </button>
    </nav>

    <!-- Toast container -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        /* ============================================================
           CoinPulse - Complete Game Logic
           ============================================================ */

        // ---------- Telegram WebApp Init ----------
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            if (tg.colorScheme) {
                document.documentElement.style.colorScheme = tg.colorScheme;
            }
        }

        // ---------- Game Constants ----------
        const CONFIG = {
            ENERGY_MAX: 100,
            ENERGY_REGEN_MS: 6000,       // 1 energy per 6 seconds
            COINS_PER_TAP: 1,
            AD_REWARD: 500,
            DAILY_BASE: 100,
            STORAGE_KEY: 'coinpulse_data_v1',
            ADSGRAM_BLOCK_ID: 36912,
        };

        // ---------- Default State ----------
        const defaultState = () => ({
            coins: 0,
            totalTaps: 0,
            energy: CONFIG.ENERGY_MAX,
            lastEnergyUpdate: Date.now(),
            lastDailyClaim: 0,
            dailyStreak: 0,
            missions: {
                taps100:   { target: 100,  reward: 200,  claimed: false },
                taps500:   { target: 500,  reward: 1000, claimed: false },
                taps1000:  { target: 1000, reward: 2500, claimed: false },
                coins5000: { target: 5000, reward: 1500, claimed: false },
                coins25000:{ target: 25000,reward: 7500, claimed: false },
            },
            user: {
                id: null,
                username: 'Player',
                firstName: 'P',
            },
        });

        // ---------- State Management ----------
        let state = loadState();

        function loadState() {
            try {
                const saved = localStorage.getItem(CONFIG.STORAGE_KEY);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    return { ...defaultState(), ...parsed };
                }
            } catch (e) {
                console.warn('Failed to load state:', e);
            }
            return defaultState();
        }

        function saveState() {
            try {
                localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(state));
            } catch (e) {
                console.warn('Failed to save state:', e);
            }
        }

        // ---------- Utility Functions ----------
        function formatNumber(n) {
            if (n >= 1_000_000) return (n / 1_000_000).toFixed(2) + 'M';
            if (n >= 1_000) return (n / 1_000).toFixed(1) + 'K';
            return n.toLocaleString();
        }

        function getLevel(coins) {
            return Math.floor(Math.sqrt(coins / 500)) + 1;
        }

        function getDailyReward(streak) {
            return Math.min(CONFIG.DAILY_BASE * Math.pow(1.5, streak), 5000);
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        // ---------- Telegram User Init ----------
        function initUser() {
            if (tg?.initDataUnsafe?.user) {
                const u = tg.initDataUnsafe.user;
                state.user.id = u.id;
                state.user.username = u.username || u.first_name || 'Player';
                state.user.firstName = (u.first_name || u.username || 'P').charAt(0).toUpperCase();
                saveState();
            }
            updateProfileUI();
        }

        // ---------- UI Updates ----------
        function updateHUD() {
            document.getElementById('coinCount').textContent = formatNumber(state.coins);
            document.getElementById('level').textContent = getLevel(state.coins);
            document.getElementById('username').textContent = state.user.username;
            document.getElementById('avatar').textContent = state.user.firstName;
        }

        function updateEnergyUI() {
            const pct = (state.energy / CONFIG.ENERGY_MAX) * 100;
            document.getElementById('energyFill').style.width = pct + '%';
            document.getElementById('energyCurrent').textContent = Math.floor(state.energy);
            document.getElementById('energyMax').textContent = CONFIG.ENERGY_MAX;
        }

        function updateProfileUI() {
            document.getElementById('profileAvatar').textContent = state.user.firstName;
            document.getElementById('profileName').textContent = state.user.username;
            document.getElementById('profileCoins').textContent = formatNumber(state.coins);
            document.getElementById('profileLevel').textContent = getLevel(state.coins);
            document.getElementById('profileTaps').textContent = formatNumber(state.totalTaps);
        }

        // ---------- Energy Regeneration ----------
        function processOfflineEnergy() {
            const now = Date.now();
            const elapsed = now - state.lastEnergyUpdate;
            const regenTicks = Math.floor(elapsed / CONFIG.ENERGY_REGEN_MS);
            if (regenTicks > 0 && state.energy < CONFIG.ENERGY_MAX) {
                state.energy = Math.min(CONFIG.ENERGY_MAX, state.energy + regenTicks);
                state.lastEnergyUpdate = now;
                saveState();
            }
        }

        function startEnergyRegen() {
            setInterval(() => {
                if (state.energy < CONFIG.ENERGY_MAX) {
                    state.energy = Math.min(CONFIG.ENERGY_MAX, state.energy + 1);
                    state.lastEnergyUpdate = Date.now();
                    updateEnergyUI();
                    saveState();
                }
            }, CONFIG.ENERGY_REGEN_MS);
        }

        // ---------- Tap Logic ----------
        const mainCoin = document.getElementById('mainCoin');
        const coinWrapper = document.getElementById('coinWrapper');

        coinWrapper.addEventListener('click', (e) => {
            if (state.energy < 1) {
                showToast('No energy! Wait or watch an ad.', 'error');
                return;
            }

            state.energy -= 1;
            state.coins += CONFIG.COINS_PER_TAP;
            state.totalTaps += 1;
            state.lastEnergyUpdate = Date.now();

            // Animations
            mainCoin.classList.add('pulse');
            setTimeout(() => mainCoin.classList.remove('pulse'), 100);

            const ring = mainCoin.querySelector('.coin-ring');
            ring.classList.remove('pulse');
            void ring.offsetWidth;
            ring.classList.add('pulse');

            // Floating +1 text
            const float = document.createElement('div');
            float.className = 'float-text';
            float.textContent = '+1';
            const rect = coinWrapper.getBoundingClientRect();
            float.style.left = (e.clientX - rect.left) + 'px';
            float.style.top = (e.clientY - rect.top) + 'px';
            coinWrapper.appendChild(float);
            setTimeout(() => float.remove(), 1000);

            // Haptic feedback
            if (tg?.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }

            updateHUD();
            updateEnergyUI();
            updateMissions();
            saveState();
        });

        // ---------- Daily Reward ----------
        function updateDailyUI() {
            const now = Date.now();
            const last = state.lastDailyClaim;
            const canClaim = !isSameDay(last, now);
            const btn = document.getElementById('claimDailyBtn');
            const timer = document.getElementById('dailyTimer');

            document.getElementById('streakCount').textContent = state.dailyStreak;
            document.getElementById('nextReward').textContent = formatNumber(getDailyReward(state.dailyStreak));

            if (canClaim) {
                btn.disabled = false;
                btn.textContent = 'Claim Daily Reward';
                timer.textContent = '';
            } else {
                btn.disabled = true;
                const next = getNextDayMidnight(last);
                const remaining = next - now;
                timer.textContent = 'Next reward in: ' + formatTime(remaining);
            }
        }

        function isSameDay(t1, t2) {
            if (!t1) return false;
            const d1 = new Date(t1);
            const d2 = new Date(t2);
            return d1.getFullYear() === d2.getFullYear() &&
                   d1.getMonth() === d2.getMonth() &&
                   d1.getDate() === d2.getDate();
        }

        function isConsecutiveDay(prev, now) {
            if (!prev) return false;
            const d1 = new Date(prev);
            d1.setHours(0, 0, 0, 0);
            const d2 = new Date(now);
            d2.setHours(0, 0, 0, 0);
            const diff = (d2 - d1) / (1000 * 60 * 60 * 24);
            return diff === 1;
        }

        function getNextDayMidnight(ts) {
            const d = new Date(ts);
            d.setDate(d.getDate() + 1);
            d.setHours(0, 0, 0, 0);
            return d.getTime();
        }

        function formatTime(ms) {
            const s = Math.floor(ms / 1000);
            const h = Math.floor(s / 3600);
            const m = Math.floor((s % 3600) / 60);
            const sec = s % 60;
            return `${h}h ${m}m ${sec}s`;
        }

        document.getElementById('claimDailyBtn').addEventListener('click', () => {
            const now = Date.now();
            if (isSameDay(state.lastDailyClaim, now)) return;

            if (isConsecutiveDay(state.lastDailyClaim, now)) {
                state.dailyStreak += 1;
            } else {
                state.dailyStreak = 1;
            }

            const reward = getDailyReward(state.dailyStreak - 1);
            state.coins += reward;
            state.lastDailyClaim = now;

            if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            showToast(`+${formatNumber(reward)} coins claimed!`, 'success');

            updateHUD();
            updateDailyUI();
            saveState();
        });

        setInterval(updateDailyUI, 1000);

        // ---------- Missions ----------
        const MISSION_DEFS = [
            { key: 'taps100',   title: 'Tap 100 times',    icon: '👆', getValue: () => state.totalTaps },
            { key: 'taps500',   title: 'Tap 500 times',    icon: '💪', getValue: () => state.totalTaps },
            { key: 'taps1000',  title: 'Tap 1000 times',   icon: '🔥', getValue: () => state.totalTaps },
            { key: 'coins5000', title: 'Earn 5,000 coins', icon: '💰', getValue: () => state.coins },
            { key: 'coins25000',title: 'Earn 25,000 coins',icon: '💎', getValue: () => state.coins },
        ];

        function updateMissions() {
            const list = document.getElementById('missionList');
            list.innerHTML = '';
            MISSION_DEFS.forEach(def => {
                const m = state.missions[def.key];
                const current = Math.min(def.getValue(), m.target);
                const done = current >= m.target;
                const claimed = m.claimed;

                const item = document.createElement('div');
                item.className = 'mission-item' + (claimed ? ' completed' : '');
                item.innerHTML = `
                    <div class="mission-icon">${def.icon}</div>
                    <div class="mission-info">
                        <div class="mission-title">${def.title}</div>
                        <div class="mission-progress">${formatNumber(current)} / ${formatNumber(m.target)}</div>
                    </div>
                    <button class="mission-reward ${done && !claimed ? 'claimable' : ''}"
                            data-key="${def.key}"
                            ${(!done || claimed) ? 'disabled' : ''}>
                        ${claimed ? '✓ Claimed' : `+${formatNumber(m.reward)}`}
                    </button>
                `;
                list.appendChild(item);
            });

            // Attach claim handlers
            list.querySelectorAll('.mission-reward.claimable').forEach(btn => {
                btn.addEventListener('click', () => claimMission(btn.dataset.key));
            });
        }

        function claimMission(key) {
            const m = state.missions[key];
            if (!m || m.claimed) return;
            state.coins += m.reward;
            m.claimed = true;
            if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            showToast(`Mission complete! +${formatNumber(m.reward)} coins`, 'success');
            updateHUD();
            updateMissions();
            saveState();
        }

        // ---------- Leaderboard (dummy data) ----------
        function renderLeaderboard() {
            const list = document.getElementById('leaderboardList');
            const dummy = [
                { name: 'CryptoKing',   coins: 1250000, level: 50 },
                { name: 'TapMaster',    coins: 980000,  level: 44 },
                { name: 'GoldRush',     coins: 750000,  level: 38 },
                { name: 'DiamondHand',  coins: 520000,  level: 32 },
                { name: 'MoonBoy',      coins: 310000,  level: 24 },
                { name: 'RocketMan',    coins: 180000,  level: 19 },
                { name: 'StarDust',     coins: 95000,   level: 13 },
                { name: 'NovaPulse',    coins: 45000,   level: 9 },
            ];

            // Insert current user
            const me = {
                name: state.user.username,
                coins: state.coins,
                level: getLevel(state.coins),
                isMe: true,
            };

            const combined = [...dummy, me].sort((a, b) => b.coins - a.coins);

            list.innerHTML = '';
            combined.forEach((p, i) => {
                const rank = i + 1;
                const topClass = rank === 1 ? 'top-1' : rank === 2 ? 'top-2' : rank === 3 ? 'top-3' : '';
                const meClass = p.isMe ? 'me' : '';
                const initial = p.name.charAt(0).toUpperCase();

                const item = document.createElement('div');
                item.className = `leaderboard-item ${topClass} ${meClass}`;
                item.innerHTML = `
                    <div class="lb-rank">${rank <= 3 ? ['🥇','🥈','🥉'][rank-1] : '#' + rank}</div>
                    <div class="lb-avatar">${initial}</div>
                    <div class="lb-info">
                        <div class="lb-name">${p.name}${p.isMe ? ' (You)' : ''}</div>
                        <div class="lb-level">Level ${p.level}</div>
                    </div>
                    <div class="lb-coins">${formatNumber(p.coins)} 🪙</div>
                `;
                list.appendChild(item);
            });
        }

        // ---------- Navigation ----------
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const page = btn.dataset.page;
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById('page-' + page).classList.add('active');

                // Refresh dynamic pages when opened
                if (page === 'missions') updateMissions();
                if (page === 'leaderboard') renderLeaderboard();
                if (page === 'profile') updateProfileUI();
                if (page === 'daily') updateDailyUI();

                if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            });
        });

        // ---------- Reset Progress ----------
        document.getElementById('resetBtn').addEventListener('click', () => {
            if (confirm('Are you sure you want to reset all progress? This cannot be undone.')) {
                state = defaultState();
                saveState();
                updateHUD();
                updateEnergyUI();
                updateProfileUI();
                updateMissions();
                updateDailyUI();
                showToast('Progress reset', 'info');
            }
        });

        // ---------- AdsGram Integration (Block ID: 36912) ----------
        let adsgramController = null;

        function initAdsGram() {
            if (typeof AdsGram === 'undefined') {
                console.warn('AdsGram SDK not loaded');
                return;
            }

            try {
                adsgramController = AdsGram.init({
                    blockId: CONFIG.ADSGRAM_BLOCK_ID,
                });
                console.log('AdsGram initialized with Block ID:', CONFIG.ADSGRAM_BLOCK_ID);
            } catch (e) {
                console.error('AdsGram init failed:', e);
            }
        }

        function showRewardedAd() {
            if (!adsgramController) {
                showToast('Ads not available right now', 'error');
                return;
            }

            const btn = document.getElementById('watchAdBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="ad-icon">⏳</span> Loading ad...';

            adsgramController.show()
                .then(() => {
                    // Ad completed successfully - grant reward
                    state.coins += CONFIG.AD_REWARD;
                    saveState();
                    updateHUD();
                    if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    showToast(`+${CONFIG.AD_REWARD} coins earned!`, 'success');
                })
                .catch((err) => {
                    console.warn('Ad error:', err);
                    if (err && err.type === 'adError') {
                        showToast('No ads available right now', 'error');
                    } else if (err && err.type === 'adTimeout') {
                        showToast('Ad timed out, try again', 'error');
                    } else {
                        showToast('Ad failed to load', 'error');
                    }
                })
                .finally(() => {
                    btn.disabled = false;
                    btn.innerHTML = '<span class="ad-icon">🎬</span> Watch Ad (+500 coins)';
                });
        }

        document.getElementById('watchAdBtn').addEventListener('click', showRewardedAd);

        // ---------- Initialize Everything ----------
        function init() {
            initUser();
            processOfflineEnergy();
            updateHUD();
            updateEnergyUI();
            updateEnergyUI();
            updateMissions();
            updateDailyUI();
            renderLeaderboard();
            startEnergyRegen();
            initAdsGram();

            // Auto-save every 30 seconds
            setInterval(saveState, 30000);

            console.log('🪙 CoinPulse initialized!');
        }

        // Start the app
        init();
    </script>
</body>
</html>
