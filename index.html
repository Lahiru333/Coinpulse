<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coinpulse - Earn USDT</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- AdsGram Official Native Asynchronous SDK -->
    <script src="https://sad.adsgram.ai/js/advadsgram-sdk.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); 
            color: white; 
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 70px;
        }
        
        .app-header { 
            background: rgba(0,0,0,0.5); 
            padding: 15px 20px; 
            position: sticky; 
            top: 0; 
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        
        .user-welcome { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            margin-bottom: 20px;
        }
        
        .user-avatar { 
            width: 50px; 
            height: 50px; 
            border-radius: 15px; 
            background: linear-gradient(135deg, #00ff88, #00cc6a); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold;
            font-size: 24px;
            color: #000;
        }
        
        .user-info h3 { font-size: 16px; margin-bottom: 3px; }
        .user-info span { font-size: 12px; opacity: 0.7; }
        
        .balance-card {
            background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,170,0,0.1));
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            border: 2px solid rgba(255,215,0,0.3);
            margin-bottom: 20px;
        }
        
        .balance-label { font-size: 14px; opacity: 0.8; margin-bottom: 10px; letter-spacing: 1px; }
        .balance-amount { font-size: 48px; font-weight: bold; color: #ffd700; margin: 10px 0; }
        .balance-usd { font-size: 16px; opacity: 0.9; margin-top: 10px; }
        .balance-details { 
            display: flex; 
            justify-content: space-around; 
            margin-top: 20px; 
            padding-top: 20px; 
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        .detail-item { text-align: center; }
        .detail-value { font-size: 18px; font-weight: bold; color: #00ff88; }
        .detail-label { font-size: 11px; opacity: 0.7; margin-top: 3px; }
        
        .quick-actions { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 10px; 
            margin-bottom: 20px;
        }
        
        .action-btn {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .action-btn:active { transform: scale(0.95); }
        .action-btn i { font-size: 24px; margin-bottom: 8px; display: block; }
        .action-btn span { font-size: 11px; }
        .action-btn:nth-child(1) { background: rgba(0,255,136,0.2); }
        .action-btn:nth-child(2) { background: rgba(138,43,226,0.2); }
        .action-btn:nth-child(3) { background: rgba(30,144,255,0.2); }
        .action-btn:nth-child(4) { background: rgba(255,215,0,0.2); }
        
        .earn-section { margin-bottom: 20px; padding: 0 20px; }
        .section-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; opacity: 0.9; }
        
        .earn-cards { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); 
            gap: 12px;
        }
        
        .earn-card {
            background: rgba(255,255,255,0.08);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .earn-card:active { transform: scale(0.98); }
        .earn-card i { font-size: 32px; margin-bottom: 10px; }
        .earn-card h3 { font-size: 14px; margin-bottom: 5px; }
        .earn-card p { font-size: 11px; opacity: 0.7; }
        .earn-card.watch { background: linear-gradient(135deg, rgba(0,123,255,0.3), rgba(0,123,255,0.1)); }
        .earn-card.tasks { background: linear-gradient(135deg, rgba(40,167,69,0.3), rgba(40,167,69,0.1)); }
        .earn-card.refer { background: linear-gradient(135deg, rgba(111,66,193,0.3), rgba(111,66,193,0.1)); }
        
        .referral-section {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            margin: 0 20px 20px;
        }
        
        .referral-title { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            margin-bottom: 15px;
            font-size: 14px;
            font-weight: bold;
        }
        
        .referral-link {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 12px;
            font-size: 12px;
            word-break: break-all;
            margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .copy-btn {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.95);
            padding: 10px 15px;
            display: flex;
            justify-content: space-around;
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            padding: 5px 15px;
            cursor: pointer;
            color: rgba(255,255,255,0.6);
            transition: all 0.3s;
        }
        
        .nav-item.active { color: #ffd700; }
        .nav-item i { font-size: 22px; }
        .nav-item span { font-size: 11px; }
        
        .content-section { display: none; padding: 20px; }
        .content-section.active { display: block; }
        
        .ad-card {
            background: rgba(255,255,255,0.08);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .ad-header { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            margin-bottom: 15px;
        }
        
        .ad-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        
        .ad-info h3 { font-size: 16px; margin-bottom: 3px; }
        .ad-info p { font-size: 12px; opacity: 0.7; }
        
        .ad-progress {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
        }
        
        .progress-text { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 10px;
            font-size: 13px;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00cc6a);
            transition: width 0.3s;
        }
        
        .watch-btn {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        
        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: #fff;
            color: #000;
            padding: 15px 30px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            font-weight: 600;
            opacity: 0;
            transition: all 0.3s;
            z-index: 2000;
        }
        
        .notification.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        
        .ad-status {
            background: rgba(0,255,136,0.1);
            border: 1px solid #00ff88;
            border-radius: 10px;
            padding: 12px;
            margin: 10px 0 20px;
            text-align: center;
            font-size: 13px;
            color: #00ff88;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="notification" id="notification"></div>
    
    <!-- Home Section -->
    <div id="home" class="content-section active">
        <div class="app-header">
            <div class="user-welcome">
                <div class="user-avatar" id="user-avatar">U</div>
                <div class="user-info">
                    <h3 id="username">User</h3>
                    <span id="user-id">ID: 12345</span>
                </div>
            </div>
            
            <div class="balance-card">
                <div class="balance-label">YOUR BALANCE</div>
                <div class="balance-amount"><span id="balance">0.00</span></div>
                <div class="balance-usd">≈ $<span id="usd-value">0.00</span> USDT</div>
                <div class="balance-details">
                    <div class="detail-item">
                        <div class="detail-value" id="total-coins">0</div>
                        <div class="detail-label">Coins</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Ads Section -->
    <div id="ads" class="content-section">
        <div class="app-header">
            <h2 style="margin-bottom: 10px;">Watch Ads & Earn</h2>
            <div class="ad-status" id="ad-status">🔄 Connecting to AdsGram Network...</div>
        </div>
        
        <!-- Reward Ad Type 1 -->
        <div class="ad-card">
            <div class="ad-header">
                <div class="ad-icon">📺</div>
                <div class="ad-info">
                    <h3>AdsGram Reward</h3>
                    <p>+10 Coins per ad</p>
                </div>
            </div>
            <div class="ad-progress">
                <div class="progress-text">
                    <span id="ads-watched-1">0 / 5 ads</span>
                    <span id="ads-left-1">5 left</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="ads-progress-1" style="width: 0%"></div>
                </div>
            </div>
            <button class="watch-btn" onclick="triggerRealAd(1, 5, 0.010, 10)" id="watch-btn-1">
                ▶️ Watch Ad - +10 Coins
            </button>
        </div>
        
        <!-- Reward Ad Type 2 -->
        <div class="ad-card">
            <div class="ad-header">
                <div class="ad-icon" style="background: linear-gradient(135deg, #ff4444, #ff0000);">🎯</div>
                <div class="ad-info">
                    <h3>AdsGram AI</h3>
                    <p>+8 Coins per ad</p>
                </div>
            </div>
            <div class="ad-progress">
                <div class="progress-text">
                    <span id="ads-watched-2">0 / 15 ads</span>
                    <span id="ads-left-2">15 left</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="ads-progress-2" style="width: 0%"></div>
                </div>
            </div>
            <button class="watch-btn" style="background: linear-gradient(135deg, #ff4444, #ff0000);" onclick="triggerRealAd(2, 15, 0.008, 8)" id="watch-btn-2">
                ▶️ Watch Ad - +8 Coins
            </button>
        </div>
    </div>
    
    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('home')"><i class="fas fa-home"></i><span>Home</span></div>
        <div class="nav-item" onclick="switchTab('ads')"><i class="fas fa-play-circle"></i><span>Ads</span></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        const user = tg.initDataUnsafe.user;
        const userId = user ? user.id : 'guest';
        const username = user ? (user.username || user.first_name) : 'Guest';
        const userInitial = username.charAt(0).toUpperCase();
        
        // 100% Real Live AdsGram Production Block ID
        const ADSGRAM_BLOCK_ID = '36912'; 
        let AdController = null;

        // Try to initialize authentic AdsGram controller
        function initializeAdsGram() {
            if (window.AdsGram) {
                AdController = window.AdsGram.init({ blockId: ADSGRAM_BLOCK_ID });
                document.getElementById('ad-status').textContent = "✅ AdsGram SDK Connected (Live Mode)";
                document.getElementById('ad-status').style.borderColor = "#00ff88";
                document.getElementById('ad-status').style.color = "#00ff88";
            } else {
                document.getElementById('ad-status').textContent = "❌ Network Error: AdsGram Script Blocked";
                document.getElementById('ad-status').style.borderColor = "#ff4444";
                document.getElementById('ad-status').style.color = "#ff4444";
            }
        }

        // Run checking shortly after load
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(initializeAdsGram, 1000);
        });
        
        // LocalStorage Data
        let data = {
            balance: parseFloat(localStorage.getItem(`balance_${userId}`)) || 0,
            totalCoins: parseInt(localStorage.getItem(`totalCoins_${userId}`)) || 0,
            adCount1: parseInt(localStorage.getItem(`adCount1_${userId}`)) || 0,
            adCount2: parseInt(localStorage.getItem(`adCount2_${userId}`)) || 0
        };
        
        document.getElementById('username').textContent = username;
        document.getElementById('user-id').textContent = 'ID: ' + userId;
        document.getElementById('user-avatar').textContent = userInitial;
        
        function updateUI() {
            document.getElementById('balance').textContent = data.balance.toFixed(2);
            document.getElementById('usd-value').textContent = data.balance.toFixed(2);
            document.getElementById('total-coins').textContent = data.totalCoins;
            
            document.getElementById('ads-watched-1').textContent = `${data.adCount1} / 5 ads`;
            document.getElementById('ads-left-1').textContent = `${Math.max(0, 5 - data.adCount1)} left`;
            document.getElementById('ads-progress-1').style.width = (Math.min(5, data.adCount1) / 5 * 100) + '%';
            
            document.getElementById('ads-watched-2').textContent = `${data.adCount2} / 15 ads`;
            document.getElementById('ads-left-2').textContent = `${Math.max(0, 15 - data.adCount2)} left`;
            document.getElementById('ads-progress-2').style.width = (Math.min(15, data.adCount2) / 15 * 100) + '%';
        }

        // PURE REAL AD TRIGGER (NO TEST MODE FALLBACK)
        function triggerRealAd(adBlockType, maxLimit, rewardUsdt, rewardCoins) {
            if (adBlockType === 1 && data.adCount1 >= maxLimit) {
                tg.showAlert('Daily limit reached for this section.');
                return;
            }
            if (adBlockType === 2 && data.adCount2 >= maxLimit) {
                tg.showAlert('Daily limit reached for this section.');
                return;
            }

            // Force check initialization if it wasn't ready
            if (!AdController && window.AdsGram) {
                AdController = window.AdsGram.init({ blockId: ADSGRAM_BLOCK_ID });
            }

            if (!AdController) {
                tg.showAlert('Error: Unable to connect to AdsGram servers. Please check your internet or VPN settings!');
                return;
            }

            showNotification('Opening Real Video Ad...');

            // Execute Live Adsgram call
            AdController.show().then((result) => {
                // Verified Watch Reward Event Triggered
                if (adBlockType === 1) data.adCount1++;
                if (adBlockType === 2) data.adCount2++;
                
                data.balance += rewardUsdt;
                data.totalCoins += rewardCoins;
                
                saveData();
                updateUI();
                showNotification(`✅ Success! +${rewardCoins} Coins credited.`);
                tg.HapticFeedback.notificationOccurred('success');
            }).catch((err) => {
                console.error('AdsGram Error:', err);
                // Handle different skip results properly
                if (err && err.description) {
                    tg.showAlert(`Ad terminated: ${err.description}`);
                } else {
                    tg.showAlert('Ad was skipped or could not load. Reward denied.');
                }
            });
        }
        
        function switchTab(tabName) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            
            const navItems = document.querySelectorAll('.nav-item');
            if (tabName === 'home') navItems[0].classList.add('active');
            else if (tabName === 'ads') navItems[1].classList.add('active');
        }
        
        function saveData() {
            localStorage.setItem(`balance_${userId}`, data.balance);
            localStorage.setItem(`totalCoins_${userId}`, data.totalCoins);
            localStorage.setItem(`adCount1_${userId}`, data.adCount1);
            localStorage.setItem(`adCount2_${userId}`, data.adCount2);
        }
        
        function showNotification(msg) {
            const n = document.getElementById('notification');
            n.textContent = msg;
            n.classList.add('show');
            setTimeout(() => n.classList.remove('show'), 2500);
        }
        
        updateUI();
    </script>
</body>
</html>
