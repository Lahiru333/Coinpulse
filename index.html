<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoinPulse - Mini Game</title>
    
    <!-- Telegram Web Apps SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Adsgram SDK -->
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1e1e2f, #11111d);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 5px;
            color: #00d2ff;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
        }

        .score-container {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 20px;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.05);
        }

        /* Coin Style */
        .coin-btn {
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, #ffe066 0%, #f5b041 70%, #d35400 100%);
            border-radius: 50%;
            border: 8px solid #f39c12;
            box-shadow: 0 0 25px rgba(241, 196, 15, 0.6);
            cursor: pointer;
            outline: none;
            transition: transform 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
        }

        .coin-btn:active {
            transform: scale(0.92);
        }

        /* Ad Button Style */
        .ad-btn {
            margin-top: 40px;
            padding: 15px 30px;
            font-size: 1rem;
            font-weight: bold;
            color: #11111d;
            background: linear-gradient(90deg, #00ffcc, #00d2ff);
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.4);
            transition: all 0.3s ease;
        }

        .ad-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 210, 255, 0.6);
        }

        .ad-btn:disabled {
            background: #555;
            color: #aaa;
            box-shadow: none;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <h1>CoinPulse</h1>
    <div class="score-container">⚡ <span id="score">0</span> Coins</div>

    <!-- Main Clicker Button -->
    <button class="coin-btn" id="clickBtn">🪙</button>

    <!-- Adsgram Button -->
    <button class="ad-btn" id="adBtn">🎬 Watch Ad (+100 Bonus)</button>

    <script>
        // Telegram WebApp initialize කිරීම
        const tg = window.Telegram.WebApp;
        tg.expand(); // Screen එක full size කරන්න

        let coins = 0;
        const scoreDisplay = document.getElementById('score');
        const clickBtn = document.getElementById('clickBtn');
        const adBtn = document.getElementById('adBtn');

        // Click කරද්දී coin එකතු වීම
        clickBtn.addEventListener('click', () => {
            coins += 1;
            scoreDisplay.innerText = coins;
            
            // Haptic Feedback (Phone එක vibration වීම - Telegram එක ඇතුලේ විතරයි වැඩ කරන්නේ)
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
        });

        // Adsgram Initialize කිරීම (ඔයාගේ Block ID එක ඇතුලත් කර ඇත)
        const AdController = window.Adsgram.init({ blockId: "37199" });

        // Ad Button එක click කරද්දී ad එක play කිරීම
        adBtn.addEventListener('click', () => {
            adBtn.disabled = true; // Ad එක loading වෙද්දී button එක disable කරනවා
            adBtn.innerText = "Loading Ad...";

            AdController.show().then((result) => {
                // Ad එක සාර්ථකව බලා ඉවර වුනොත් (Reward user)
                coins += 100;
                scoreDisplay.innerText = coins;
                alert("🎉 Congratulations! You received 100 Bonus Coins!");
                resetAdButton();
            }).catch((result) => {
                // Ad එකේ මොකක් හරි error එකක් ආවොත් හෝ user ad එක skip කලොත්
                console.error("Adsgram Error:", result);
                alert("⚠️ Ad not available or skipped. Please try again later.");
                resetAdButton();
            });
        });

        function resetAdButton() {
            adBtn.disabled = false;
            adBtn.innerText = "🎬 Watch Ad (+100 Bonus)";
        }
    </script>
</body>
</html>
