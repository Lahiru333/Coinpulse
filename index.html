<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CoinPulse Mini Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://adsgram.ai/js/adsgram.min.js"></script>
    <style>
        /* ... CSS all same as before ... */
    </style>
</head>
<body>
    <!-- ... HTML all same as before ... -->

    <script>
        // ===== STATE =====
        const state = {
            balance: 0.0000,
            coins: 0,
            tapPower: 1,
            energy: 100,
            maxEnergy: 100,
            energyRegen: 1,
            level: 1,
            totalEarned: 0.0000,
            referrals: 0,
            adsWatched: 0,
            isAdWatching: false
        };

        // ===== DOM REFS =====
        const $ = id => document.getElementById(id);
        const balanceDisplay = $('balanceDisplay');
        const levelDisplay = $('levelDisplay');
        const coinCount = $('coinCount');
        const tapPower = $('tapPower');
        const totalEarned = $('totalEarned');
        const energyFill = $('energyFill');
        const energyText = $('energyText');
        const tapArea = $('tapArea');
        const coinImage = $('coinImage');
        const tapCounter = $('tapCounter');
        const referralCount = $('referralCount');

        // ===== TELEGRAM INIT =====
        let tg = window.Telegram?.WebApp || { 
            initDataUnsafe: { user: { id: 12345 } },
            ready: () => {},
            close: () => {},
            HapticFeedback: { impactOccurred: () => {} }
        };
        tg.ready();
        if (tg.expand) tg.expand();

        // ===== SAVE/LOAD =====
        function saveState() {
            try {
                const data = {
                    balance: state.balance,
                    coins: state.coins,
                    tapPower: state.tapPower,
                    energy: state.energy,
                    maxEnergy: state.maxEnergy,
                    energyRegen: state.energyRegen,
                    level: state.level,
                    totalEarned: state.totalEarned,
                    referrals: state.referrals,
                    adsWatched: state.adsWatched
                };
                localStorage.setItem('coinpulse_data', JSON.stringify(data));
            } catch(e) {}
        }

        function loadState() {
            try {
                const raw = localStorage.getItem('coinpulse_data');
                if (!raw) return;
                const data = JSON.parse(raw);
                Object.assign(state, data);
                updateUI();
            } catch(e) {}
        }

        // ===== UPDATE UI =====
        function updateUI() {
            balanceDisplay.textContent = state.balance.toFixed(4);
            levelDisplay.textContent = state.level;
            coinCount.textContent = state.coins;
            tapPower.textContent = state.tapPower;
            totalEarned.textContent = state.totalEarned.toFixed(4);
            energyFill.style.width = `${(state.energy / state.maxEnergy) * 100}%`;
            energyText.textContent = `${Math.floor(state.energy)}/${state.maxEnergy}`;
            referralCount.textContent = state.referrals;
            saveState();
        }

        // ===== TAP MECHANICS =====
        function handleTap(e) {
            if (state.energy < 1) {
                tg.HapticFeedback?.impactOccurred('error');
                return;
            }

            tg.HapticFeedback?.impactOccurred('light');

            coinImage.classList.remove('pop');
            void coinImage.offsetWidth;
            coinImage.classList.add('pop');

            const reward = 0.0001 * state.tapPower;
            tapCounter.textContent = `+${reward.toFixed(4)}`;
            tapCounter.style.opacity = '1';
            tapCounter.style.transform = 'translateY(0)';
            setTimeout(() => {
                tapCounter.style.opacity = '0';
                tapCounter.style.transform = 'translateY(-20px)';
            }, 400);

            state.balance += reward;
            state.totalEarned += reward;
            state.coins += 1 * state.tapPower;
            state.energy -= 1;

            const newLevel = Math.floor(state.coins / 1000) + 1;
            if (newLevel > state.level) {
                state.level = newLevel;
                tg.HapticFeedback?.impactOccurred('heavy');
            }

            updateUI();
        }

        // ===== ENERGY REGEN =====
        setInterval(() => {
            if (state.energy < state.maxEnergy) {
                state.energy = Math.min(state.energy + state.energyRegen, state.maxEnergy);
                updateUI();
            }
        }, 1000);

        // ===== AD SYSTEM WITH REAL ADSGRAM =====
        const ADSGRAM_BLOCK_ID = '36912';

        function showAd(rewardAmount, adsRequired) {
            if (state.isAdWatching) return;
            state.isAdWatching = true;

            const overlay = $('adOverlay');
            overlay.style.display = 'flex';

            // Check if Adsgram is available
            if (typeof Adsgram !== 'undefined') {
                try {
                    const adController = Adsgram.init({
                        blockId: ADSGRAM_BLOCK_ID,
                        onReward: (result) => {
                            console.log('✅ Ad reward received:', result);
                            completeAd(rewardAmount, adsRequired);
                            adController.destroy();
                        },
                        onError: (error) => {
                            console.error('❌ Ad error:', error);
                            state.isAdWatching = false;
                            overlay.style.display = 'none';
                            alert('Ad failed to load. Please try again.');
                            adController.destroy();
                        },
                        onClose: () => {
                            console.log('👋 Ad closed early');
                            state.isAdWatching = false;
                            overlay.style.display = 'none';
                            adController.destroy();
                        }
                    });

                    adController.show();

                } catch(error) {
                    console.error('❌ Adsgram init error:', error);
                    state.isAdWatching = false;
                    overlay.style.display = 'none';
                    alert('Failed to initialize ad. Please try again.');
                }
            } else {
                // Fallback simulation
                console.warn('⚠️ Adsgram SDK not loaded, using simulation');
                simulateAd(rewardAmount, adsRequired);
            }
        }

        // ===== SIMULATED AD (Fallback) =====
        function simulateAd(rewardAmount, adsRequired) {
            const progressFill = $('adProgressFill');
            const skipBtn = $('adSkipBtn');
            const overlay = $('adOverlay');
            
            progressFill.style.width = '0%';
            skipBtn.style.display = 'none';

            let progress = 0;
            const duration = 3000;
            const interval = 50;
            const step = (interval / duration) * 100;

            const timer = setInterval(() => {
                progress += step;
                if (progress >= 100) {
                    clearInterval(timer);
                    progressFill.style.width = '100%';
                    skipBtn.style.display = 'block';
                    skipBtn.textContent = `✅ Claim ${rewardAmount.toFixed(4)} USDT`;
                    skipBtn.dataset.reward = rewardAmount;
                    skipBtn.dataset.ads = adsRequired;
                } else {
                    progressFill.style.width = `${Math.min(progress, 100)}%`;
                }
            }, interval);
        }

        function completeAd(rewardAmount, adsRequired) {
            const reward = rewardAmount || 0.0001;
            const ads = adsRequired || 50;

            state.balance += reward;
            state.totalEarned += reward;
            state.coins += ads;
            state.adsWatched += 1;

            tg.HapticFeedback?.impactOccurred('success');
            updateUI();

            $('adOverlay').style.display = 'none';
            state.isAdWatching = false;

            showNotification(`+${reward.toFixed(4)} USDT earned!`);
        }

        function showNotification(message) {
            const notif = document.createElement('div');
            notif.style.cssText = `
                position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
                background: #1a2332; color: #f7931a; padding: 12px 24px;
                border-radius: 16px; font-weight: 700; z-index: 999;
                border: 1px solid rgba(247,147,26,0.3);
                animation: fadeIn 0.3s ease;
            `;
            notif.textContent = message;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 2500);
        }

        // ===== TASK BUTTONS =====
        document.querySelectorAll('.task-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const reward = parseFloat(this.dataset.reward) || 0.0001;
                const ads = parseInt(this.dataset.ads) || 50;
                showAd(reward, ads);
            });
        });

        // ===== BOOST FUNCTIONS =====
        function upgradeTap() {
            const cost = 50 * state.level;
            if (state.coins < cost) {
                tg.HapticFeedback?.impactOccurred('error');
                alert(`Need ${cost} coins!`);
                return;
            }
            state.coins -= cost;
            state.tapPower += 1;
            tg.HapticFeedback?.impactOccurred('success');
            updateUI();
        }

        function upgradeEnergy() {
            const cost = 100 * state.level;
            if (state.coins < cost) {
                tg.HapticFeedback?.impactOccurred('error');
                alert(`Need ${cost} coins!`);
                return;
            }
            state.coins -= cost;
            state.maxEnergy += 10;
            state.energy = state.maxEnergy;
            state.energyRegen += 0.5;
            tg.HapticFeedback?.impactOccurred('success');
            updateUI();
        }

        // ===== REFERRAL =====
        function shareReferral() {
            const userId = tg.initDataUnsafe?.user?.id || '12345';
            const link = `https://t.me/coinpulse_bot?start=ref_${userId}`;
            
            if (navigator.share) {
                navigator.share({
                    title: '💰 Join CoinPulse!',
                    text: 'Earn USDT by tapping! Use my referral:',
                    url: link
                }).then(() => {
                    state.referrals += 1;
                    state.balance += 0.0005;
                    updateUI();
                }).catch(() => {});
            } else {
                navigator.clipboard?.writeText(link).then(() => {
                    alert('✅ Referral link copied! Share it to earn 0.0005 USDT per referral.');
                }).catch(() => {
                    prompt('Copy this link:', link);
                });
            }
        }

        // ===== TABS =====
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                const tab = this.dataset.tab;
                document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
                
                const targetMap = {
                    'game': null,
                    'tasks': 'tasksTab',
                    'boost': 'boostTab',
                    'referral': 'referralTab'
                };
                const targetId = targetMap[tab];
                if (targetId) {
                    $(targetId).style.display = 'block';
                } else {
                    document.querySelector('.game-container').style.display = 'block';
                    document.querySelector('.stats').style.display = 'grid';
                }
            });
        });

        document.querySelector('.game-container').style.display = 'block';
        document.querySelector('.stats').style.display = 'grid';

        // ===== EVENT LISTENERS =====
        tapArea.addEventListener('click', handleTap);
        tapArea.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleTap(e);
        });

        // ===== CHECK ADSGRAM STATUS =====
        console.log('🚀 CoinPulse Mini Game loaded!');
        console.log('📺 Adsgram Block ID:', ADSGRAM_BLOCK_ID);
        console.log('📡 Adsgram SDK loaded:', typeof Adsgram !== 'undefined');
        console.log('💡 Tap the coin to earn USDT!');

        // ===== INIT =====
        loadState();
        updateUI();
    </script>
</body>
</html>
