<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>CoinPulse - Mini Game</title>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0b0e17;
            color: #e0e6f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        #app {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            max-height: 820px;
            background: linear-gradient(145deg, #0f1320 0%, #1a1f2e 100%);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        /* ===== HEADER ===== */
        .header {
            padding: 16px 20px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            flex-shrink: 0;
        }

        .header .logo {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, #f7b731, #f5a623);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }

        .header .logo span {
            font-weight: 300;
            -webkit-text-fill-color: #7a8ba8;
        }

        .header .balance {
            background: rgba(255, 255, 255, 0.06);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            color: #f7b731;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(247, 183, 49, 0.15);
        }

        .header .balance::before {
            content: "🪙";
            font-size: 14px;
        }

        /* ===== GAME AREA ===== */
        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px 16px 8px;
            position: relative;
            min-height: 0;
        }

        /* ===== COIN ===== */
        .coin-container {
            position: relative;
            width: 180px;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 4px auto 8px;
            cursor: pointer;
            touch-action: manipulation;
            user-select: none;
        }

        .coin-pulse {
            width: 170px;
            height: 170px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #f7d875, #d4891b 70%, #a5610a);
            box-shadow: 
                0 0 30px rgba(247, 183, 49, 0.15),
                inset 0 -8px 20px rgba(0,0,0,0.4),
                inset 0 8px 20px rgba(255,215,100,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 56px;
            font-weight: 700;
            color: rgba(255,255,255,0.15);
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            transition: transform 0.08s ease, box-shadow 0.08s ease;
            position: relative;
            will-change: transform;
            border: 2px solid rgba(255,215,100,0.2);
        }

        .coin-pulse::after {
            content: "₿";
            font-size: 28px;
            color: rgba(255,255,255,0.08);
            position: absolute;
            bottom: 18px;
            right: 22px;
            font-weight: 300;
        }

        .coin-pulse:active {
            transform: scale(0.92);
            box-shadow: 0 0 50px rgba(247, 183, 49, 0.08), inset 0 -4px 12px rgba(0,0,0,0.5);
        }

        /* ===== RIPPLE ===== */
        .ripple {
            position: absolute;
            border-radius: 50%;
            border: 2px solid rgba(247, 183, 49, 0.3);
            animation: rippleAnim 0.5s ease-out forwards;
            pointer-events: none;
        }

        @keyframes rippleAnim {
            0% { width: 0; height: 0; opacity: 0.8; }
            100% { width: 280px; height: 280px; opacity: 0; }
        }

        /* ===== STATS ===== */
        .stats {
            display: flex;
            justify-content: space-between;
            width: 100%;
            padding: 4px 4px 6px;
            font-size: 12px;
            color: #7a8ba8;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            flex-shrink: 0;
        }

        .stats span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stats .value {
            color: #d4dfed;
            font-weight: 600;
            font-size: 13px;
        }

        /* ===== TASK / AD SECTION ===== */
        .task-section {
            padding: 8px 16px 6px;
            background: rgba(255,255,255,0.02);
            border-top: 1px solid rgba(255,255,255,0.04);
            border-bottom: 1px solid rgba(255,255,255,0.04);
            flex-shrink: 0;
        }

        .task-section .label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #4a5a7a;
            margin-bottom: 6px;
            text-align: center;
        }

        .task-grid {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .task-btn {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            color: #b0c4e0;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            touch-action: manipulation;
            flex: 1 0 auto;
            max-width: 120px;
            justify-content: center;
        }

        .task-btn:active {
            transform: scale(0.94);
            background: rgba(247, 183, 49, 0.08);
        }

        .task-btn .reward {
            color: #f7b731;
            font-size: 10px;
            font-weight: 400;
        }

        .task-btn .ad-icon {
            font-size: 14px;
        }

        .task-btn.cooldown {
            opacity: 0.35;
            pointer-events: none;
        }

        .task-btn .progress-badge {
            font-size: 9px;
            color: #4a5a7a;
            background: rgba(255,255,255,0.05);
            padding: 1px 8px;
            border-radius: 10px;
        }

        /* ===== MULTIPLIER BAR ===== */
        .multiplier-bar {
            display: flex;
            justify-content: space-between;
            padding: 6px 16px 4px;
            font-size: 10px;
            color: #4a5a7a;
            background: rgba(0,0,0,0.15);
            border-bottom: 1px solid rgba(255,255,255,0.03);
            flex-shrink: 0;
        }

        .multiplier-bar .multi {
            color: #f7b731;
            font-weight: 700;
            font-size: 12px;
        }

        /* ===== LEVEL PROGRESS ===== */
        .level-progress {
            padding: 6px 16px 10px;
            flex-shrink: 0;
        }

        .level-progress .track {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.06);
            border-radius: 10px;
            overflow: hidden;
        }

        .level-progress .track .fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f7b731, #f5a623);
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        .level-progress .labels {
            display: flex;
            justify-content: space-between;
            font-size: 9px;
            color: #4a5a7a;
            margin-top: 4px;
        }

        /* ===== FLY COIN ===== */
        .fly-coin {
            position: fixed;
            font-size: 20px;
            font-weight: 700;
            color: #f7b731;
            pointer-events: none;
            z-index: 999;
            animation: flyUp 1s ease-out forwards;
            text-shadow: 0 0 20px rgba(247,183,49,0.3);
        }

        @keyframes flyUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-120px) scale(0.6); }
        }

        /* ===== TOAST ===== */
        .toast {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 12px;
            color: #d4dfed;
            border: 1px solid rgba(255,255,255,0.06);
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 50;
        }

        .toast.show {
            opacity: 1;
        }

        /* ===== AD STREAK ===== */
        .streak-badge {
            background: rgba(247, 183, 49, 0.1);
            border: 1px solid rgba(247, 183, 49, 0.15);
            border-radius: 20px;
            padding: 2px 12px;
            font-size: 10px;
            color: #f7b731;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 440px) {
            .coin-container { width: 150px; height: 150px; }
            .coin-pulse { width: 140px; height: 140px; font-size: 44px; }
            .task-btn { font-size: 10px; padding: 5px 10px; max-width: 100px; }
            .header .logo { font-size: 16px; }
        }

        @media (max-height: 700px) {
            .coin-container { width: 120px; height: 120px; }
            .coin-pulse { width: 110px; height: 110px; font-size: 36px; }
            .stats { font-size: 10px; }
            .task-btn { padding: 4px 10px; font-size: 9px; }
            .header { padding: 10px 16px 8px; }
        }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div id="app">
    <!-- Header -->
    <div class="header">
        <div class="logo">CoinPulse <span>·</span> mini</div>
        <div class="balance" id="balanceDisplay">0.0000</div>
    </div>

    <!-- Multiplier Bar -->
    <div class="multiplier-bar">
        <span>LEVEL <span id="levelDisplay" class="multi">1</span></span>
        <span>× <span id="multiplierDisplay" class="multi">1.00</span></span>
        <span>CLICKS <span id="clickCountDisplay" class="multi">0</span></span>
    </div>

    <!-- Game Area -->
    <div class="game-area" id="gameArea">
        <div class="coin-container" id="coinContainer">
            <div class="coin-pulse" id="coinPulse">₿</div>
        </div>

        <div class="stats">
            <span>⚡ <span class="value" id="perClickDisplay">0.000001</span> /click</span>
            <span>🏆 <span class="value" id="totalCoinsDisplay">0.0000</span></span>
            <span>📊 <span class="value" id="sessionCoinsDisplay">0.0000</span></span>
        </div>

        <!-- Toast -->
        <div class="toast" id="toast"></div>
    </div>

    <!-- Level Progress -->
    <div class="level-progress">
        <div class="track">
            <div class="fill" id="progressFill" style="width:0%"></div>
        </div>
        <div class="labels">
            <span>Next level: <span id="nextLevelTarget">100</span> clicks</span>
            <span id="progressPercent">0%</span>
        </div>
    </div>

    <!-- Task / Ad Section -->
    <div class="task-section">
        <div class="label">
            📺 Watch Ads · 
            <span class="streak-badge">🔥 Streak: <span id="adStreakDisplay">0</span></span>
        </div>
        <div class="task-grid" id="taskGrid">
            <button class="task-btn" data-ads="1" data-base-reward="0.0001">
                <span class="ad-icon">▶</span> 1 Ad 
                <span class="reward" id="reward1">+0.0001</span>
            </button>
            <button class="task-btn" data-ads="3" data-base-reward="0.0001">
                <span class="ad-icon">▶▶</span> 3 Ads 
                <span class="reward" id="reward3">+0.0003</span>
            </button>
            <button class="task-btn" data-ads="5" data-base-reward="0.0001">
                <span class="ad-icon">▶▶▶</span> 5 Ads 
                <span class="reward" id="reward5">+0.0005</span>
            </button>
            <button class="task-btn" data-ads="10" data-base-reward="0.0001">
                <span class="ad-icon">⏯</span> 10 Ads 
                <span class="reward" id="reward10">+0.0010</span>
            </button>
        </div>
    </div>
</div>

<script>
    // ============================================================
    //  COINPULSE — Progressive Ad Reward System
    //  Each ad = 0.0001, streak bonus increases reward
    // ============================================================

    (function() {
        'use strict';

        // ---- STATE ----
        const state = {
            // Core
            balance: 0.0000,
            totalCoins: 0,
            sessionCoins: 0,
            clickCount: 0,

            // Per-click reward
            baseReward: 0.000001,
            reward: 0.000001,

            // Level
            level: 1,
            clicksForNextLevel: 100,

            // Multiplier
            multiplier: 1.00,

            // AD STREAK SYSTEM
            adStreak: 0,              // consecutive ad watches
            maxAdStreak: 0,           // highest streak achieved
            lastAdTime: 0,
            streakTimeout: 30000,     // 30 seconds to lose streak

            // Ad cooldowns (per task type)
            adCooldowns: {
                1: 0,
                3: 0,
                5: 0,
                10: 0
            },
            adCooldownTime: 45000,    // 45 seconds cooldown

            // UI refs
            balanceEl: document.getElementById('balanceDisplay'),
            perClickEl: document.getElementById('perClickDisplay'),
            totalCoinsEl: document.getElementById('totalCoinsDisplay'),
            sessionCoinsEl: document.getElementById('sessionCoinsDisplay'),
            clickCountEl: document.getElementById('clickCountDisplay'),
            levelEl: document.getElementById('levelDisplay'),
            multiplierEl: document.getElementById('multiplierDisplay'),
            progressFill: document.getElementById('progressFill'),
            nextLevelTarget: document.getElementById('nextLevelTarget'),
            progressPercent: document.getElementById('progressPercent'),
            toast: document.getElementById('toast'),
            adStreakDisplay: document.getElementById('adStreakDisplay'),

            coinPulse: document.getElementById('coinPulse'),
            coinContainer: document.getElementById('coinContainer'),
            gameArea: document.getElementById('gameArea'),

            taskButtons: document.querySelectorAll('.task-btn'),
            rewardDisplays: {
                1: document.getElementById('reward1'),
                3: document.getElementById('reward3'),
                5: document.getElementById('reward5'),
                10: document.getElementById('reward10')
            }
        };

        // ---- HELPERS ----
        function formatNum(n, decimals = 4) {
            return Number(n).toFixed(decimals);
        }

        function clamp(v, min, max) {
            return Math.min(max, Math.max(min, v));
        }

        // ---- TOAST ----
        let toastTimeout = null;

        function showToast(msg, duration = 1800) {
            const t = state.toast;
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                t.classList.remove('show');
            }, duration);
        }

        // ---- UPDATE UI ----
        function updateUI() {
            const s = state;

            s.balanceEl.textContent = formatNum(s.balance);
            s.perClickEl.textContent = formatNum(s.reward, 6);
            s.totalCoinsEl.textContent = formatNum(s.totalCoins);
            s.sessionCoinsEl.textContent = formatNum(s.sessionCoins);
            s.clickCountEl.textContent = s.clickCount;
            s.levelEl.textContent = s.level;
            s.multiplierEl.textContent = s.multiplier.toFixed(2);
            s.adStreakDisplay.textContent = s.adStreak;

            // Progress
            const progress = Math.min(s.clickCount / s.clicksForNextLevel, 1);
            s.progressFill.style.width = (progress * 100) + '%';
            s.nextLevelTarget.textContent = s.clicksForNextLevel;
            s.progressPercent.textContent = Math.round(progress * 100) + '%';

            // Update reward displays with streak bonus
            updateRewardDisplays();
        }

        // ---- UPDATE REWARD DISPLAYS WITH STREAK BONUS ----
        function updateRewardDisplays() {
            const s = state;
            const streakBonus = getStreakBonus();

            // Each ad = 0.0001 × streak bonus
            const perAd = 0.0001 * streakBonus;

            s.rewardDisplays[1].textContent = `+${formatNum(perAd * 1)}`;
            s.rewardDisplays[3].textContent = `+${formatNum(perAd * 3)}`;
            s.rewardDisplays[5].textContent = `+${formatNum(perAd * 5)}`;
            s.rewardDisplays[10].textContent = `+${formatNum(perAd * 10)}`;
        }

        // ---- STREAK BONUS CALCULATION ----
        function getStreakBonus() {
            const s = state;
            const streak = s.adStreak;

            // Streak bonus tiers:
            // 0-4 ads:  1.0x  (base)
            // 5-9 ads:  1.2x
            // 10-19 ads: 1.5x
            // 20-49 ads: 2.0x
            // 50+ ads:   3.0x

            if (streak >= 50) return 3.0;
            if (streak >= 20) return 2.0;
            if (streak >= 10) return 1.5;
            if (streak >= 5) return 1.2;
            return 1.0;
        }

        // ---- STREAK MANAGEMENT ----
        function updateStreak() {
            const s = state;
            const now = Date.now();

            // Check if streak expired
            if (s.lastAdTime > 0 && (now - s.lastAdTime) > s.streakTimeout) {
                if (s.adStreak > 0) {
                    showToast(`🔥 Streak lost! (${s.adStreak} ads)`, 1500);
                }
                s.adStreak = 0;
                updateUI();
            }
        }

        function incrementStreak() {
            const s = state;
            s.adStreak += 1;
            s.lastAdTime = Date.now();

            // Track max streak
            if (s.adStreak > s.maxAdStreak) {
                s.maxAdStreak = s.adStreak;
            }

            // Show streak milestone
            const bonus = getStreakBonus();
            if (s.adStreak === 5) {
                showToast('🔥 5 ads streak! +20% bonus!', 1800);
            } else if (s.adStreak === 10) {
                showToast('🔥🔥 10 ads streak! +50% bonus!', 2000);
            } else if (s.adStreak === 20) {
                showToast('🔥🔥🔥 20 ads streak! 2x bonus!', 2200);
            } else if (s.adStreak === 50) {
                showToast('🏆 LEGENDARY! 50 ads streak! 3x bonus!', 2500);
            } else if (s.adStreak % 10 === 0 && s.adStreak > 0) {
                showToast(`🔥 ${s.adStreak} ads streak! ${bonus}x bonus!`, 1500);
            }

            updateUI();
        }

        // ---- FLY COIN ----
        function flyCoin(x, y, text = '+0.000001') {
            const el = document.createElement('div');
            el.className = 'fly-coin';
            el.textContent = text;
            el.style.left = (x - 20) + 'px';
            el.style.top = (y - 20) + 'px';
            el.style.animation = `flyUp 0.9s ease-out forwards`;
            el.style.transform = `rotate(${Math.random() * 30 - 15}deg)`;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }

        // ---- RIPPLE ----
        function createRipple(e) {
            const container = state.coinContainer;
            const rect = container.getBoundingClientRect();
            const size = Math.min(rect.width, rect.height) * 0.6;
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            const cx = (e.clientX || e.touches?.[0]?.clientX || rect.left + rect.width/2) - rect.left - size/2;
            const cy = (e.clientY || e.touches?.[0]?.clientY || rect.top + rect.height/2) - rect.top - size/2;
            ripple.style.left = cx + 'px';
            ripple.style.top = cy + 'px';
            ripple.style.width = size + 'px';
            ripple.style.height = size + 'px';
            container.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        }

        // ---- CORE: CLICK ----
        function handleCoinClick(e) {
            const s = state;

            let earned = s.reward * (0.95 + Math.random() * 0.10);

            if (s.clickCount > 80) {
                const fatigue = 1 - (s.clickCount - 80) * 0.001;
                earned *= Math.max(fatigue, 0.7);
            }

            earned = Math.max(earned, 0.0000001);

            s.balance += earned;
            s.totalCoins += earned;
            s.sessionCoins += earned;
            s.clickCount += 1;

            if (s.clickCount >= s.clicksForNextLevel) {
                levelUp();
            }

            updateUI();

            const rect = state.coinPulse.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            flyCoin(cx + (Math.random()-0.5)*30, cy + (Math.random()-0.5)*30, '+' + formatNum(earned, 6));

            createRipple(e);

            if (navigator.vibrate) navigator.vibrate(6);
        }

        // ---- LEVEL UP ----
        function levelUp() {
            const s = state;
            s.level += 1;
            s.clickCount = 0;
            s.clicksForNextLevel = Math.floor(s.clicksForNextLevel * 1.25) + 10;
            s.multiplier = 1.00 + (s.level - 1) * 0.02;
            s.reward = s.baseReward * s.multiplier;
            if (s.reward > 0.00005) s.reward = 0.00005;

            showToast(`🎉 Level ${s.level}! ×${s.multiplier.toFixed(2)}`, 2000);

            const bonus = 0.0001 * s.level;
            s.balance += bonus;
            showToast(`+${formatNum(bonus)} bonus`, 1200);
        }

        // ---- AD TASK ----
        function handleAdTask(e) {
            const btn = e.currentTarget;
            const ads = parseInt(btn.dataset.ads, 10);
            const baseReward = parseFloat(btn.dataset.baseReward);

            const s = state;

            // Check cooldown
            const now = Date.now();
            const last = s.adCooldowns[ads] || 0;
            if (now - last < s.adCooldownTime) {
                const remaining = Math.ceil((s.adCooldownTime - (now - last)) / 1000);
                showToast(`⏳ Cooldown: ${remaining}s`, 1500);
                return;
            }

            // Check streak expiry
            updateStreak();

            // Get streak bonus
            const streakBonus = getStreakBonus();

            // Calculate reward: each ad = 0.0001 × streak bonus
            const perAdReward = baseReward * streakBonus;
            const totalReward = perAdReward * ads;

            // "Watch ad" simulation
            btn.textContent = '⏳ Watching...';
            btn.style.opacity = '0.5';
            btn.disabled = true;

            // Random ad duration (1.5 - 3 seconds)
            const adDuration = 1500 + Math.random() * 1500;

            setTimeout(() => {
                // Add reward
                s.balance += totalReward;
                s.totalCoins += totalReward;
                s.sessionCoins += totalReward;

                // Update cooldown
                s.adCooldowns[ads] = Date.now();

                // Increment streak
                incrementStreak();

                // Update UI
                updateUI();

                // Restore button
                const bonusText = streakBonus > 1 ? ` (${streakBonus}x)` : '';
                btn.textContent = btn.dataset.originalText || '▶ Watch';
                btn.style.opacity = '1';
                btn.disabled = false;

                // Show toast with streak info
                const rewardText = formatNum(totalReward, 6);
                showToast(`📺 +${rewardText} USDT (${ads} ad${ads>1?'s':''})${bonusText}`, 2000);

                // Fly effect
                const rect = btn.getBoundingClientRect();
                flyCoin(rect.left + rect.width/2, rect.top, '+' + formatNum(totalReward, 6));

            }, adDuration);
        }

        // ---- SETUP TASKS ----
        function setupTasks() {
            const btns = state.taskButtons;
            btns.forEach(btn => {
                btn.dataset.originalText = btn.textContent.trim();
                btn.addEventListener('click', handleAdTask);
                btn.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    btn.click();
                });
            });
        }

        // ---- COOLDOWN TICKER ----
        function updateCooldownUI() {
            const s = state;
            const now = Date.now();

            // Update streak
            updateStreak();

            s.taskButtons.forEach(btn => {
                const ads = parseInt(btn.dataset.ads, 10);
                const last = s.adCooldowns[ads] || 0;
                const remaining = s.adCooldownTime - (now - last);
                if (remaining > 0) {
                    const secs = Math.ceil(remaining / 1000);
                    btn.classList.add('cooldown');
                    btn.textContent = `⏳ ${secs}s`;
                } else {
                    btn.classList.remove('cooldown');
                    if (btn.dataset.originalText) {
                        btn.textContent = btn.dataset.originalText;
                    }
                }
            });
        }

        // ---- INIT ----
        function init() {
            const s = state;

            s.reward = s.baseReward;
            s.clicksForNextLevel = 100;

            const coin = state.coinPulse;
            coin.addEventListener('click', handleCoinClick);
            coin.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleCoinClick(e);
            });

            setupTasks();
            updateUI();

            setInterval(updateCooldownUI, 1000);

            document.addEventListener('visibilitychange', () => {
                if (!document.hidden) updateCooldownUI();
            });

            setTimeout(() => {
                showToast('🪙 Tap the coin! Watch ads for bonuses!', 2500);
            }, 400);

            console.log('🪙 CoinPulse — Progressive Ad Rewards Active');
            console.log(`📺 Each ad = 0.0001 USDT (streak bonus up to 3x)`);
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

    })();
</script>

</body>
</html>
