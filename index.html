<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CoinPulse Pro</title>
    
    <!-- Adsgram SDK -->
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #0a0d14;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .app {
            max-width: 400px;
            width: 100%;
            background: linear-gradient(145deg, #141b2b, #0e1320);
            border-radius: 40px;
            padding: 24px 20px 30px;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            position: relative;
            overflow: hidden;
        }
        
        .app::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, rgba(247,147,26,0.03), transparent 70%);
            pointer-events: none;
        }
        
        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            position: relative;
            z-index: 1;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #f7931a, #f5b24c);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 800;
            color: #0a0d14;
            box-shadow: 0 4px 15px rgba(247,147,26,0.3);
        }
        
        .logo h1 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(90deg, #fff, #94a9d1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .status {
            background: rgba(0,200,150,0.12);
            border: 1px solid rgba(0,200,150,0.15);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 10px;
            color: #4ade80;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        /* Game Area */
        .game {
            background: rgba(0,0,0,0.35);
            border-radius: 28px;
            padding: 20px 16px 22px;
            border: 1px solid rgba(255,255,255,0.04);
            position: relative;
            z-index: 1;
        }
        
        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 8px;
        }
        
        .stat {
            flex: 1;
            background: rgba(0,0,0,0.3);
            padding: 10px 12px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.04);
        }
        
        .stat-label {
            font-size: 9px;
            color: #6b7fa0;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        
        .stat-value {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            margin-top: 2px;
        }
        
        .stat-value.gold {
            color: #f5b24c;
        }
        
        .stat-value.green {
            color: #4ade80;
        }
        
        /* Click Button */
        .tap-btn {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #f8c45a, #d97a0e);
            border: none;
            box-shadow: 0 12px 30px rgba(215,120,10,0.4), inset 0 -4px 0 #8f4f00, inset 0 4px 20px #ffe28b;
            color: #1f1a0f;
            font-size: 56px;
            cursor: pointer;
            transition: all 0.08s linear;
            display: block;
            margin: 4px auto 8px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            position: relative;
        }
        
        .tap-btn:active {
            transform: scale(0.90);
            box-shadow: 0 6px 15px rgba(215,120,10,0.5), inset 0 -2px 0 #7a4200;
        }
        
        .tap-btn .pulse {
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 2px solid rgba(247,147,26,0.2);
            animation: pulse-ring 2s ease-out infinite;
        }
        
        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.3); opacity: 0; }
        }
        
        .tap-hint {
            text-align: center;
            font-size: 12px;
            color: #5a6f91;
            margin-top: 6px;
        }
        
        /* Ads Section */
        .ads-section {
            margin-top: 18px;
            background: rgba(0,0,0,0.25);
            border-radius: 24px;
            padding: 14px 12px 12px;
            border: 1px solid rgba(255,255,255,0.04);
            position: relative;
            z-index: 1;
        }
        
        .ads-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding: 0 4px;
        }
        
        .ads-header span {
            font-size: 10px;
            color: #4e6180;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            font-weight: 600;
        }
        
        .ads-header .badge {
            background: rgba(247,147,26,0.12);
            color: #f5b24c;
            padding: 2px 12px;
            border-radius: 30px;
            font-size: 9px;
        }
        
        adsgram-task {
            display: block;
            width: 100%;
            min-height: 70px;
            background: rgba(18,26,42,0.4);
            border-radius: 18px;
            padding: 2px;
            --adsgram-task-bg: transparent;
            --adsgram-task-radius: 18px;
        }
        
        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(16px);
            color: #fff;
            padding: 14px 28px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            max-width: 90%;
            text-align: center;
        }
        
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        
        .toast .icon { margin-right: 8px; }
        
        /* Footer */
        .footer {
            margin-top: 18px;
            text-align: center;
            font-size: 9px;
            color: #2a3a52;
            letter-spacing: 0.5px;
            position: relative;
            z-index: 1;
        }
        
        .footer a {
            color: #4e6a8f;
            text-decoration: none;
        }
        
        /* Loading */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px;
            color: #4e6180;
            font-size: 11px;
        }
        
        .loading .dot {
            width: 6px;
            height: 6px;
            background: #f5b24c;
            border-radius: 50%;
            animation: bounce 1.2s ease-in-out infinite;
        }
        
        .loading .dot:nth-child(2) { animation-delay: 0.2s; }
        .loading .dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="app">
    <!-- Header -->
    <div class="header">
        <div class="logo">
            <div class="logo-icon">₿</div>
            <h1>CoinPulse</h1>
        </div>
        <div class="status">● LIVE</div>
    </div>
    
    <!-- Game -->
    <div class="game">
        <div class="stats">
            <div class="stat">
                <div class="stat-label">Score</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Earned</div>
                <div class="stat-value gold" id="earned">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Bonus</div>
                <div class="stat-value green" id="bonus">0</div>
            </div>
        </div>
        
        <button class="tap-btn" id="tapBtn">
            <span class="pulse"></span>
            ⛏️
        </button>
        <div class="tap-hint">tap to mine · watch ads for rewards</div>
    </div>
    
    <!-- Ads Section -->
    <div class="ads-section">
        <div class="ads-header">
            <span>📺 Sponsor Task</span>
            <span class="badge">+2 bonus</span>
        </div>
        
        <!-- ✅ Adsgram Task - blockId 36912 -->
        <adsgram-task
            id="adsTask"
            data-block-id="task-36912"
            data-debug="true"
            data-debug-console="true"
        ></adsgram-task>
        
        <div id="adsStatus" class="loading" style="display:none;">
            <span>Loading ad</span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
    </div>
    
    <div class="footer">
        powered by <a href="#" onclick="return false;">Adsgram</a> · v3.0
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
(function() {
    'use strict';
    
    // ---------- DOM Refs ----------
    const scoreEl = document.getElementById('score');
    const earnedEl = document.getElementById('earned');
    const bonusEl = document.getElementById('bonus');
    const tapBtn = document.getElementById('tapBtn');
    const toast = document.getElementById('toast');
    const adsStatus = document.getElementById('adsStatus');
    const adsTask = document.getElementById('adsTask');
    
    // ---------- State ----------
    let score = 0;
    let earned = 0;
    let bonus = 0;
    let toastTimeout = null;
    
    // ---------- UI Updates ----------
    function updateUI() {
        scoreEl.textContent = score;
        earnedEl.textContent = earned;
        bonusEl.textContent = bonus;
    }
    
    // ---------- Toast ----------
    function showToast(message, isSuccess = true) {
        if (toastTimeout) {
            clearTimeout(toastTimeout);
            toast.classList.remove('show');
        }
        
        toast.innerHTML = `<span class="icon">${isSuccess ? '✅' : '⚠️'}</span> ${message}`;
        toast.style.borderColor = isSuccess ? 'rgba(74,222,128,0.2)' : 'rgba(251,146,60,0.2)';
        
        // Force reflow
        void toast.offsetWidth;
        toast.classList.add('show');
        
        toastTimeout = setTimeout(() => {
            toast.classList.remove('show');
        }, 3000);
    }
    
    // ---------- Tap Handler ----------
    function handleTap() {
        score += 1;
        if (Math.random() < 0.25) {
            earned += 1;
        }
        updateUI();
        
        // Haptic
        try {
            if (window.Telegram?.WebApp?.HapticFeedback) {
                window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
            }
        } catch (_) {}
    }
    
    tapBtn.addEventListener('click', handleTap);
    tapBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        handleTap();
    }, { passive: false });
    
    // ---------- Adsgram Integration ----------
    if (adsTask) {
        // Show loading indicator
        adsStatus.style.display = 'flex';
        
        // Task loaded
        adsTask.addEventListener('taskLoaded', function(e) {
            adsStatus.style.display = 'none';
            console.log('[CoinPulse] Ads task loaded');
        });
        
        // Task completed - GIVE BONUS!
        adsTask.addEventListener('taskComplete', function(e) {
            bonus += 2;
            updateUI();
            showToast('🎉 Ad completed! +2 bonus earned');
            console.log('[CoinPulse] Task complete:', e.detail);
        });
        
        // Task error - fallback bonus
        adsTask.addEventListener('taskError', function(e) {
            adsStatus.style.display = 'none';
            console.warn('[CoinPulse] Task error:', e.detail);
            
            // Fallback: give bonus anyway if error
            bonus += 1;
            updateUI();
            showToast('⚡ Bonus credited! (ad unavailable)', false);
        });
        
        // Timeout fallback (10 seconds)
        const timeoutId = setTimeout(() => {
            if (adsStatus.style.display !== 'none') {
                adsStatus.style.display = 'none';
                bonus += 1;
                updateUI();
                showToast('⏰ Bonus credited! (timeout)', false);
            }
        }, 10000);
        
        // Clear timeout on load
        adsTask.addEventListener('taskLoaded', function() {
            clearTimeout(timeoutId);
        });
        
        // Debug: show when task is ready
        adsTask.addEventListener('taskReady', function(e) {
            console.log('[CoinPulse] Task ready:', e.detail);
        });
    } else {
        console.warn('[CoinPulse] adsgram-task element not found');
    }
    
    // ---------- Telegram WebApp ----------
    try {
        if (window.Telegram?.WebApp) {
            const webApp = window.Telegram.WebApp;
            webApp.ready();
            webApp.expand();
            console.log('[CoinPulse] Telegram WebApp ready');
        }
    } catch (_) {}
    
    // ---------- Init ----------
    updateUI();
    console.log('[CoinPulse] 🚀 App initialized | blockId: task-36912');
    
    // Expose for debugging
    window.__coinpulse = { score, earned, bonus, updateUI, showToast };
})();
</script>

</body>
</html>
